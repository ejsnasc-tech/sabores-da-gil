<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sabores da Gil | Painel Administrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --dourado: #B5A642;
      --dourado-escuro: #8F8133;
      --marrom: #3E1F00;
      --marrom-claro: #6B3A00;
      --creme: #FEFAE0;
      --creme-escuro: #F5EDD8;
      --branco: #FFFFFF;
      --perigo: #E63946;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--marrom);
      background: var(--creme-escuro);
    }
    .container {
      width: min(1200px, 93%);
      margin-inline: auto;
    }

    header {
      background: var(--marrom);
      color: var(--creme);
      padding: 12px 0;
      box-shadow: 0 8px 16px rgba(0,0,0,.16);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: #fff2;
      padding: 3px;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(1.1rem, 3.2vw, 1.5rem);
      font-weight: 700;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      background: #694327;
      display: inline-block;
    }
    .header-btn:hover { opacity: .92; }

    main { padding: 24px 0 34px; }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }
    .card {
      background: var(--branco);
      border-radius: 14px;
      border: 1px solid #efe4c6;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(62,31,0,.08);
    }
    h2 {
      margin: 0 0 14px;
      font-family: 'Playfair Display', serif;
      color: var(--marrom);
    }
    .muted {
      color: var(--marrom-claro);
      font-size: .95rem;
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: .92rem;
      font-weight: 600;
      color: var(--marrom-claro);
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #dacba6;
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      color: var(--marrom);
      background: #fffdf7;
    }
    textarea { min-height: 96px; resize: vertical; }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.salvar { background: var(--dourado); color: var(--marrom); }
    .btn.salvar:hover { background: var(--dourado-escuro); color: #fff; }
    .btn.cancelar { background: #999; color: #fff; display: none; }
    .msg-sucesso {
      margin-top: 8px;
      background: #e8f7eb;
      color: #0d6d30;
      border: 1px solid #b7e6c4;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: .9rem;
      display: none;
    }

    .lista {
      display: grid;
      gap: 10px;
    }
    .item {
      border: 1px solid #ede2c6;
      border-radius: 12px;
      padding: 12px;
      background: #fffdf8;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .item-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      color: var(--marrom);
      font-size: 1.02rem;
    }
    .item-price {
      font-weight: 700;
      color: var(--marrom-claro);
      white-space: nowrap;
      font-size: .95rem;
    }
    .badge {
      display: inline-block;
      font-size: .73rem;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid #d8ca9f;
      color: var(--marrom-claro);
      margin-left: 2px;
      background: #fff8e8;
    }
    .desc {
      margin: 0;
      color: #6c4d2b;
      font-size: .9rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .item-btn {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
    }
    .item-btn.editar { background: var(--dourado); color: var(--marrom); }
    .item-btn.remover { background: var(--perigo); color: #fff; }
    .empty {
      border: 1px dashed #ccb98d;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      color: var(--marrom-claro);
      background: #fffef7;
    }
    .img-upload-area {
      border: 2px dashed #dacba6;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      background: #fffdf7;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .img-upload-area:hover {
      border-color: var(--dourado);
      background: #fff8e8;
    }
    .img-upload-area img {
      max-width: 100%;
      max-height: 180px;
      border-radius: 10px;
      object-fit: cover;
    }
    .img-upload-area .placeholder-txt {
      color: var(--marrom-claro);
      font-size: .85rem;
    }
    .img-upload-area .placeholder-txt i {
      font-size: 1.6rem;
      display: block;
      margin-bottom: 4px;
      color: var(--dourado-escuro);
    }
    .btn-remover-img {
      border: none;
      background: var(--perigo);
      color: #fff;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(62, 31, 0, .85);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-box {
      background: var(--branco);
      border-radius: 16px;
      padding: 32px;
      width: min(380px, 90%);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,.3);
    }
    .login-box h2 {
      font-family: 'Playfair Display', serif;
      margin: 0 0 6px;
    }
    .login-box p {
      margin: 0 0 18px;
      color: var(--marrom-claro);
      font-size: .9rem;
    }
    .login-box input {
      width: 100%;
      border: 1px solid #dacba6;
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 12px;
    }
    .login-box button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--dourado);
      color: var(--marrom);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    .login-box button:hover { background: var(--dourado-escuro); color: #fff; }
    .login-erro {
      color: var(--perigo);
      font-size: .85rem;
      margin-top: 8px;
      display: none;
    }
    .loading-msg {
      text-align: center;
      padding: 20px;
      color: var(--marrom-claro);
    }
    .item-img {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid #ede2c6;
      flex-shrink: 0;
    }
    .item-top-with-img {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .emoji-wrapper { position: relative; }
    .emoji-preview {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #emoji {
      flex: 1;
    }
    .emoji-selected {
      font-size: 2rem;
      min-width: 42px;
      text-align: center;
      line-height: 1;
    }
    .emoji-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--branco);
      border: 1px solid #dacba6;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(62,31,0,.15);
      max-height: 260px;
      overflow-y: auto;
      margin-top: 4px;
    }
    .emoji-dropdown.open { display: block; }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 2px;
      padding: 8px;
    }
    .emoji-option {
      font-size: 1.5rem;
      text-align: center;
      padding: 6px 0;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: none;
      transition: background .15s;
    }
    .emoji-option:hover {
      background: #f5edd8;
    }
    .emoji-cat-label {
      font-size: .78rem;
      font-weight: 700;
      color: var(--marrom-claro);
      padding: 8px 10px 2px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .emoji-no-result {
      padding: 14px;
      text-align: center;
      color: var(--marrom-claro);
      font-size: .9rem;
    }

    @media (min-width: 980px) {
      .layout {
        grid-template-columns: 0.9fr 1.35fr;
      }
    }
  </style>
</head>
<body>
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h2>🔐 Acesso Admin</h2>
      <p>Digite a senha para acessar o painel.</p>
      <input type="password" id="login-senha" placeholder="Senha" />
      <button onclick="verificarSenha()">Entrar</button>
      <p class="login-erro" id="login-erro">Senha incorreta. Tente novamente.</p>
    </div>
  </div>

  <header>
    <div class="container header-inner">
      <div class="brand">
        <img src="logo.svg" alt="Logo Sabores da Gil" />
        <h1>Painel Administrativo</h1>
      </div>
      <div class="header-actions">
        <a class="header-btn" href="index.html">← Ver Site</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container layout">
      <section class="card">
        <h2 id="titulo-form">➕ Adicionar Marmita</h2>
        <form id="form-marmita">
          <div class="emoji-wrapper">
            <label for="emoji">Emoji</label>
            <div class="emoji-preview">
              <span class="emoji-selected" id="emoji-selected">🍗</span>
              <input id="emoji" type="text" placeholder="Digite para buscar... ex: frango, salada" />
            </div>
            <div class="emoji-dropdown" id="emoji-dropdown"></div>
          </div>
          <div>
            <label for="nome">Nome</label>
            <input id="nome" type="text" required />
          </div>
          <div>
            <label for="descricao">Descrição</label>
            <textarea id="descricao" required></textarea>
          </div>
          <div>
            <label for="preco">Preço</label>
            <input id="preco" type="number" step="0.01" min="0" placeholder="0.00" required />
          </div>
          <div>
            <label for="categoria">Categoria</label>
            <select id="categoria" required>
              <option value="tradicional">Tradicional</option>
              <option value="fit">Fitness</option>
              <option value="especial">Especial</option>
            </select>
          </div>
          <div>
            <label for="badge">Badge</label>
            <input id="badge" type="text" placeholder="Popular, Novo, Fit..." />
          </div>
          <div>
            <label>Imagem da Marmita</label>
            <input id="imagem-file" type="file" accept="image/*" style="display:none" />
            <div class="img-upload-area" id="img-upload-area" onclick="document.getElementById('imagem-file').click()">
              <span class="placeholder-txt"><i>📷</i> Clique para enviar uma foto</span>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn salvar" type="submit">💾 Salvar Marmita</button>
            <button class="btn cancelar" id="btn-cancelar" type="button" onclick="limparFormulario()">✖ Cancelar</button>
          </div>
          <div class="msg-sucesso" id="msg-sucesso">Marmita salva com sucesso! ✅</div>
        </form>
      </section>

      <section class="card">
        <h2>Marmitas Cadastradas (<span id="contador-itens">0</span>)</h2>
        <p class="muted">Edite, remova ou atualize os pratos conforme a necessidade.</p>
        <div id="lista-marmitas" class="lista"></div>
      </section>
    </div>
  </main>

  <script>
    let editandoId = null;
    let emojiSelecionado = "🍗";
    let imagemBase64 = "";
    let itensCache = [];
    let senhaAdmin = "";

    // ===== LOGIN =====
    document.getElementById("login-senha").addEventListener("keydown", (e) => {
      if (e.key === "Enter") verificarSenha();
    });

    function verificarSenha() {
      const input = document.getElementById("login-senha").value;
      if (!input) return;

      fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ senha: input }),
      })
        .then((r) => r.json())
        .then((data) => {
          if (data.ok) {
            senhaAdmin = input;
            document.getElementById("login-overlay").style.display = "none";
          } else {
            document.getElementById("login-erro").style.display = "block";
          }
        })
        .catch(() => {
          document.getElementById("login-erro").style.display = "block";
        });
    }

        ["⭐","estrela,star,especial,destaque"],["🔥","fogo,fire,quente,popular,hit"],["❤️","coracao,heart,amor,favorito"],
        ["💛","amarelo,coracao,feliz"],["🏆","trofeu,trophy,melhor,campeao"],["✨","brilho,novo,new,lancamento"],
        ["💎","diamante,premium,luxo"],["👑","coroa,crown,premium,vip"],["🎉","festa,party,novo,especial"],
        ["💰","preco,money,dinheiro,oferta"],["🏷️","etiqueta,preco,desconto"],["🎁","presente,brinde,gratis"],
        ["🆕","novo,new,lancamento"],["🔝","top,melhor,premium"],["💯","cem,perfeito,nota maxima"],
        ["👨‍🍳","chef,cozinheiro,masculino"],["👩‍🍳","chef,cozinheira,feminino"],["🧑‍🍳","cozinheiro,chef,geral"],
        ["🛵","entrega,delivery,moto,rapido"],["🚚","caminhao,entrega,truck,delivery"],
        ["💪","forte,fitness,proteina,musculacao"],["🌿","natural,verde,organico,leaf"],
        ["🌱","saudavel,organico,vegano,sustentavel"],["🫶","amor,carinho,cuidado,feito com amor"]
      ]
    };

    function initEmojiPicker() {
      const input = document.getElementById("emoji");
      const dropdown = document.getElementById("emoji-dropdown");
      const selectedEl = document.getElementById("emoji-selected");

      function renderEmojis(filtro = "") {
        const termo = filtro.toLowerCase().trim();
        let html = "";
        let total = 0;

        for (const [cat, lista] of Object.entries(EMOJIS)) {
          const filtrados = lista.filter(([em, tags]) =>
            !termo || em.includes(termo) || tags.toLowerCase().includes(termo)
          );
          if (filtrados.length === 0) continue;
          total += filtrados.length;
          html += `<div class="emoji-cat-label">${cat}</div><div class="emoji-grid">`;
          for (const [em] of filtrados) {
            html += `<button type="button" class="emoji-option" data-emoji="${em}" title="${em}">${em}</button>`;
          }
          html += `</div>`;
        }

        if (total === 0) {
          html = `<div class="emoji-no-result">Nenhum emoji encontrado 😕</div>`;
        }
        dropdown.innerHTML = html;
      }

      input.addEventListener("focus", () => {
        renderEmojis(input.value);
        dropdown.classList.add("open");
      });

      input.addEventListener("input", () => {
        renderEmojis(input.value);
        dropdown.classList.add("open");
      });

      dropdown.addEventListener("click", (e) => {
        const btn = e.target.closest(".emoji-option");
        if (!btn) return;
        const emoji = btn.dataset.emoji;
        emojiSelecionado = emoji;
        selectedEl.textContent = emoji;
        input.value = "";
        dropdown.classList.remove("open");
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".emoji-wrapper")) {
          dropdown.classList.remove("open");
        }
      });

      renderEmojis();
    }

    const itensPadrao = [
      { id: 1, nome: "Frango Grelhado", descricao: "Frango grelhado temperado na hora com arroz, feijão, macarrão e salada fresca.", preco: "0.00", categoria: "tradicional", emoji: "🍗", badge: "Popular" },
      { id: 2, nome: "Carne Assada", descricao: "Carne assada no ponto certo com arroz, feijão, macarrão e acompanhamentos.", preco: "0.00", categoria: "tradicional", emoji: "🥩", badge: "Popular" },
      { id: 3, nome: "Marmita Fitness", descricao: "Proteína grelhada, arroz integral, legumes no vapor e salada. Leve e nutritiva!", preco: "0.00", categoria: "fit", emoji: "🥗", badge: "Fit" },
      { id: 4, nome: "Marmita Especial da Gil", descricao: "A queridinha da casa! Combinação especial com ingredientes selecionados e tempero secreto.", preco: "0.00", categoria: "especial", emoji: "⭐", badge: "Especial" }
    ];

    function textoSeguro(valor = "") {
      return String(valor)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function carregarItens() {
      return itensCache;
    }

    function salvarItens(itens) {
      fetch("/api/cardapio", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Senha": senhaAdmin,
        },
        body: JSON.stringify(itens),
      }).catch(() => alert("Erro ao salvar. Tente novamente."));
    }

    function formatarPreco(valor) {
      const numero = Number.parseFloat(valor);
      return Number.isFinite(numero) ? numero.toFixed(2).replace(".", ",") : "0,00";
    }

    function renderizarLista() {
      const itens = carregarItens();
      const lista = document.getElementById("lista-marmitas");
      document.getElementById("contador-itens").textContent = itens.length;

      if (itens.length === 0) {
        lista.innerHTML = '<div class="empty">Nenhuma marmita cadastrada ainda. Adicione a primeira acima! 🍱</div>';
        return;
      }

      lista.innerHTML = itens.map((item) => `
        <article class="item">
          <div class="item-top-with-img">
            ${item.imagem ? `<img class="item-img" src="${textoSeguro(item.imagem)}" alt="${textoSeguro(item.nome)}" onerror="this.style.display='none'" />` : ""}
            <div style="flex:1; min-width:0;">
              <div class="item-top">
                <div>
                  <h3 class="item-title">${textoSeguro(item.emoji || "🍱")} ${textoSeguro(item.nome || "")}</h3>
                  <span class="badge">${textoSeguro(item.categoria || "")}</span>
                  ${item.badge ? `<span class="badge">${textoSeguro(item.badge)}</span>` : ""}
                </div>
                <div class="item-price">R$ ${formatarPreco(item.preco)}</div>
              </div>
              <p class="desc">${textoSeguro(item.descricao || "")}</p>
            </div>
          </div>
          <div class="item-actions">
            <button class="item-btn editar" type="button" onclick="editarItem(${Number(item.id)})">✏️ Editar</button>
            <button class="item-btn remover" type="button" onclick="removerItem(${Number(item.id)})">🗑️ Remover</button>
          </div>
        </article>
      `).join("");
    }

    function editarItem(id) {
      const item = carregarItens().find((i) => i.id === id);
      if (!item) return;

      editandoId = id;
      emojiSelecionado = item.emoji || "🍱";
      document.getElementById("emoji-selected").textContent = emojiSelecionado;
      document.getElementById("emoji").value = "";
      document.getElementById("nome").value = item.nome || "";
      document.getElementById("descricao").value = item.descricao || "";
      document.getElementById("preco").value = item.preco || "0.00";
      document.getElementById("categoria").value = item.categoria || "tradicional";
      document.getElementById("badge").value = item.badge || "";
      imagemBase64 = item.imagem || "";
      atualizarPreviewImagem(imagemBase64);
      document.getElementById("titulo-form").textContent = "✏️ Editar Marmita";
      document.getElementById("btn-cancelar").style.display = "inline-block";
      document.getElementById("msg-sucesso").style.display = "none";
      document.getElementById("form-marmita").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function removerItem(id) {
      if (!confirm("Deseja remover esta marmita?")) return;
      const itens = carregarItens().filter((i) => i.id !== id);
      salvarItens(itens);
      renderizarLista();
      if (editandoId === id) limparFormulario();
    }

    function limparFormulario() {
      editandoId = null;
      emojiSelecionado = "🍗";
      document.getElementById("emoji-selected").textContent = "🍗";
      document.getElementById("emoji").value = "";
      imagemBase64 = "";
      atualizarPreviewImagem("");
      document.getElementById("form-marmita").reset();
      document.getElementById("categoria").value = "tradicional";
      document.getElementById("titulo-form").textContent = "➕ Adicionar Marmita";
      document.getElementById("btn-cancelar").style.display = "none";
    }

    function mostrarMensagem(texto) {
      const msg = document.getElementById("msg-sucesso");
      msg.textContent = texto;
      msg.style.display = "block";
      setTimeout(() => { msg.style.display = "none"; }, 3000);
    }

    document.getElementById("form-marmita").addEventListener("submit", function (e) {
      e.preventDefault();
      const itens = carregarItens();
      const novoItem = {
        id: editandoId || Date.now(),
        emoji: emojiSelecionado || "🍱",
        nome: document.getElementById("nome").value.trim(),
        descricao: document.getElementById("descricao").value.trim(),
        preco: document.getElementById("preco").value || "0.00",
        categoria: document.getElementById("categoria").value,
        badge: document.getElementById("badge").value.trim(),
        imagem: imagemBase64
      };

      if (editandoId) {
        const idx = itens.findIndex((i) => i.id === editandoId);
        if (idx !== -1) itens[idx] = novoItem;
      } else {
        itens.push(novoItem);
      }

      salvarItens(itens);
      renderizarLista();
      limparFormulario();
      mostrarMensagem("Marmita salva com sucesso! ✅");
    });

    function atualizarPreviewImagem(dataUrl) {
      const box = document.getElementById("img-upload-area");
      if (dataUrl) {
        box.innerHTML = `<img src="${dataUrl}" alt="Pré-visualização" /><button type="button" class="btn-remover-img" onclick="event.stopPropagation(); removerImagem()">🗑️ Remover foto</button>`;
      } else {
        box.innerHTML = '<span class="placeholder-txt"><i>📷</i> Clique para enviar uma foto</span>';
      }
    }

    function removerImagem() {
      imagemBase64 = "";
      document.getElementById("imagem-file").value = "";
      atualizarPreviewImagem("");
    }

    document.getElementById("imagem-file").addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        alert("A imagem deve ter no máximo 2MB.");
        this.value = "";
        return;
      }
      const reader = new FileReader();
      reader.onload = function (e) {
        imagemBase64 = e.target.result;
        atualizarPreviewImagem(imagemBase64);
      };
      reader.readAsDataURL(file);
    });

    document.addEventListener("DOMContentLoaded", () => {
      initEmojiPicker();

      fetch("/api/cardapio")
        .then((r) => r.json())
        .then((dados) => {
          itensCache = Array.isArray(dados) ? dados.filter(Boolean) : [];
          renderizarLista();
        })
        .catch(() => renderizarLista());
    });
  </script>
</body>
